name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect release commit
        id: release-commit
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          MESSAGE="$(git log -1 --pretty=%s)"
          if [[ "$EVENT_NAME" == "push" && "$MESSAGE" =~ ^chore\(release\):\ v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "skip_verify=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_verify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.release-commit.outputs.skip_verify != 'true'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        if: steps.release-commit.outputs.skip_verify != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        if: steps.release-commit.outputs.skip_verify != 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.release-commit.outputs.skip_verify != 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.release-commit.outputs.skip_verify != 'true'
        run: pnpm typecheck

      - name: Test
        if: steps.release-commit.outputs.skip_verify != 'true'
        run: pnpm test

      - name: Build
        if: steps.release-commit.outputs.skip_verify != 'true'
        run: pnpm build
